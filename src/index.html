<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио | Главная</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <nav class='container nav'>
            <img src="img/logo_dark.png" class='logo' alt="logo">
            <div class="menu">
                <button type="button" class="menu_btn">Главная</button>
                <button type="button" class="menu_btn">Об авторе</button>
                <button type="button" class="menu_btn">Процесс</button>
                <button type="button" class="menu_btn">Работы</button>
                <button type="button" class="menu_btn">Контакты</button>
            </div>
            <div class="settings">
                <button class="color_mode">
                    <span>Тёмная тема</span>
                </button>
                <button class="scrolling_mode">
                    <span>Режим презентации</span>
                </button>
            </div>
        </nav>
    </header>
    <main>
        <section class="section main_screen">
            <div class="container"></div>
        </section>
        <section class="section about">
            <div class="container"></div>
        </section>
        <section class="section process">
            <div class="container"></div>
        </section>
        <section class="section portfolio">
            <div class="container"></div>
        </section>
    </main>
    <footer class="footer">
        <div class="container"></div>
    </footer>
   
</body>
</html>
